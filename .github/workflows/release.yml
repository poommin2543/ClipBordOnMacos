name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != v* ]]; then
            echo "Expected tag like v1.2.3, got: ${tag}" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERTIFICATE_BASE64}" ]]; then
            echo "No Developer ID certificate secret configured; release will use ad-hoc signing."
            exit 0
          fi

          if [[ -z "${MACOS_KEYCHAIN_PASSWORD}" ]]; then
            echo "MACOS_KEYCHAIN_PASSWORD is required when MACOS_CERTIFICATE_BASE64 is set." >&2
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/clipbord-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/clipbord-signing.keychain-db"

          echo "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security import "${certificate_path}" \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${keychain_path}"
          security list-keychain -d user -s "${keychain_path}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

      - name: Package release DMG
        env:
          CLIPBORD_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          CLIPBORD_ENABLE_NOTARIZATION: ${{ secrets.CLIPBORD_ENABLE_NOTARIZATION }}
          CLIPBORD_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.CLIPBORD_NOTARY_KEYCHAIN_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./script/package_dmg.sh

      - name: Locate DMG
        id: dmg
        shell: bash
        run: |
          shopt -s nullglob
          paths=(dist/ClipBord\ *.dmg)
          if [[ "${#paths[@]}" -ne 1 ]]; then
            echo "Expected exactly one dist/ClipBord *.dmg, got: ${paths[*]-none}" >&2
            ls -la dist || true
            exit 1
          fi
          echo "file=${paths[0]}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.file }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
