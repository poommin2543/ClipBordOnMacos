name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != v* ]]; then
            echo "Expected tag like v1.2.3, got: ${tag}" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Package release DMG
        run: ./script/package_dmg.sh

      - name: Locate DMG
        id: dmg
        shell: bash
        run: |
          shopt -s nullglob
          paths=(dist/ClipBord\ *.dmg)
          if [[ "${#paths[@]}" -ne 1 ]]; then
            echo "Expected exactly one dist/ClipBord *.dmg, got: ${paths[*]-none}" >&2
            ls -la dist || true
            exit 1
          fi
          echo "file=${paths[0]}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.file }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
