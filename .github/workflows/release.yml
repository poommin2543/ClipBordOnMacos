name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != v* ]]; then
            echo "Expected tag like v1.2.3, got: ${tag}" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Package release DMG
        env:
          CLIPBORD_VERSION: ${{ steps.ver.outputs.version }}
        run: ./script/package_dmg.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/ClipBord ${{ steps.ver.outputs.version }}.dmg"
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          generate_release_notes: true
