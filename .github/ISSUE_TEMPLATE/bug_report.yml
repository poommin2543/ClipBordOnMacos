name: Bug report
description: Report a reproducible ClipBord issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ClipBord version
      placeholder: "0.2.1"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.x"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open ClipBord\n2. Copy text\n3. Press Option + V"
    validations:
      required: true
  - type: dropdown
    id: accessibility
    attributes:
      label: Accessibility permission enabled?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
